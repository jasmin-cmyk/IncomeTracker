<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloom Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/recharts@2.1.15/umd/Recharts.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body class="bg-pink-50 min-h-screen">

  <div id="root"></div>

  <script>
    const {
      BarChart,
      Bar,
      XAxis,
      YAxis,
      Tooltip,
      ResponsiveContainer
    } = window.Recharts;

    const h = React.createElement;

    function App() {

      const data = [
        { month: "Jan", income: 40000, expenses: 22000 },
        { month: "Feb", income: 45000, expenses: 26000 },
        { month: "Mar", income: 47000, expenses: 28000 },
        { month: "Apr", income: 50000, expenses: 30000 },
        { month: "May", income: 52000, expenses: 32000 }
      ];

      return h(
        "div",
        {
          className: "max-w-4xl mx-auto p-6"
        },

        [

          h(
            "div",
            {
              className: "bg-white rounded-2xl shadow-lg p-6 mb-6"
            },

            [
              h(
                "h1",
                {
                  className: "text-3xl font-bold text-pink-600 mb-2"
                },
                "🌸 Bloom Tracker"
              ),

              h(
                "p",
                {
                  className: "text-gray-500"
                },
                "Simple Finance Dashboard"
              )
            ]
          ),

          h(
            "div",
            {
              className: "grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"
            },

            [

              h(
                "div",
                {
                  className: "bg-green-500 text-white rounded-2xl p-5"
                },
                [
                  h("p", { className: "text-sm" }, "Income"),
                  h("h2", { className: "text-2xl font-bold" }, "₱52,000")
                ]
              ),

              h(
                "div",
                {
                  className: "bg-rose-500 text-white rounded-2xl p-5"
                },
                [
                  h("p", { className: "text-sm" }, "Expenses"),
                  h("h2", { className: "text-2xl font-bold" }, "₱32,000")
                ]
              ),

              h(
                "div",
                {
                  className: "bg-purple-500 text-white rounded-2xl p-5"
                },
                [
                  h("p", { className: "text-sm" }, "Balance"),
                  h("h2", { className: "text-2xl font-bold" }, "₱20,000")
                ]
              )

            ]
          ),

          h(
            "div",
            {
              className: "bg-white rounded-2xl shadow-lg p-6"
            },

            [

              h(
                "h2",
                {
                  className: "text-xl font-bold mb-4"
                },
                "Monthly Overview"
              ),

              h(
                "div",
                {
                  style: {
                    width: "100%",
                    height: "350px"
                  }
                },

                h(
                  ResponsiveContainer,
                  {
                    width: "100%",
                    height: "100%"
                  },

                  h(
                    BarChart,
                    {
                      data: data
                    },

                    [
                      h(XAxis, { dataKey: "month" }),
                      h(YAxis, {}),
                      h(Tooltip, {}),

                      h(Bar, {
                        dataKey: "income",
                        fill: "#10b981"
                      }),

                      h(Bar, {
                        dataKey: "expenses",
                        fill: "#f43f5e"
                      })
                    ]
                  )
                )
              )
            ]
          )
        ]
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));

    root.render(h(App));

  </script>

</body>
</html>
